<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520" viewBox="0 0 800 520">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#09090b"/>
      <stop offset="100%" stop-color="#0f1117"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="38%" r="45%">
      <stop offset="0%" stop-color="rgba(148,163,184,0.06)"/>
      <stop offset="100%" stop-color="rgba(148,163,184,0)"/>
    </radialGradient>
    <!-- Arrow markers -->
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#93c5fd" stroke-width="1.2" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#c4b5fd" stroke-width="1.2" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#86efac" stroke-width="1.2" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" fill="url(#bg)"/>
  <rect width="800" height="520" fill="url(#glow)"/>

  <!-- Subtle grid -->
  <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
    <path d="M 64 0 L 0 0 0 64" fill="none" stroke="rgba(255,255,255,0.015)" stroke-width="1"/>
  </pattern>
  <rect width="800" height="520" fill="url(#grid)"/>

  <!-- ===== NODES ===== -->
  <!--
    Triangle layout:
      Define:   top center   (300, 50)  200x80  → center (400, 90)
      Validate: bottom-right (510, 260) 200x80  → center (610, 300)
      Execute:  bottom-left  (90, 260)  200x80  → center (190, 300)
      Logo:     center       (~380, 175)
  -->

  <!-- ===== DEFINE NODE (top center) ===== -->
  <g transform="translate(300, 50)">
    <rect x="0" y="0" width="200" height="80" rx="12"
          fill="#86efac" fill-opacity="0.08" stroke="#86efac" stroke-width="1.5" stroke-opacity="0.5"/>
    <g transform="translate(16, 14)">
      <rect x="0" y="0" width="16" height="20" rx="2" fill="none" stroke="#86efac" stroke-width="1.3" stroke-opacity="0.7"/>
      <line x1="4" y1="6" x2="12" y2="6" stroke="#86efac" stroke-width="1" stroke-opacity="0.5"/>
      <line x1="4" y1="10" x2="10" y2="10" stroke="#86efac" stroke-width="1" stroke-opacity="0.5"/>
      <line x1="4" y1="14" x2="8" y2="14" stroke="#86efac" stroke-width="1" stroke-opacity="0.5"/>
    </g>
    <text x="40" y="30" font-family="Plus Jakarta Sans, -apple-system, Helvetica, Arial, sans-serif"
          font-weight="700" font-size="18" fill="#86efac" letter-spacing="-0.3">Define</text>
    <text x="16" y="58" font-family="Plus Jakarta Sans, -apple-system, Helvetica, Arial, sans-serif"
          font-weight="400" font-size="12" fill="#86efac" fill-opacity="0.6" letter-spacing="0.2">YAML · prompts · schemas</text>
  </g>

  <!-- ===== VALIDATE NODE (bottom-right) ===== -->
  <g transform="translate(510, 260)">
    <rect x="0" y="0" width="200" height="80" rx="12"
          fill="#93c5fd" fill-opacity="0.08" stroke="#93c5fd" stroke-width="1.5" stroke-opacity="0.5"/>
    <g transform="translate(16, 14)">
      <path d="M8,1 L15,4 L15,11 Q15,18 8,21 Q1,18 1,11 L1,4 Z"
            fill="none" stroke="#93c5fd" stroke-width="1.3" stroke-opacity="0.7"/>
      <polyline points="5,11 7.5,14 12,8" fill="none" stroke="#93c5fd" stroke-width="1.3" stroke-opacity="0.7"/>
    </g>
    <text x="40" y="30" font-family="Plus Jakarta Sans, -apple-system, Helvetica, Arial, sans-serif"
          font-weight="700" font-size="18" fill="#93c5fd" letter-spacing="-0.3">Validate</text>
    <text x="16" y="58" font-family="Plus Jakarta Sans, -apple-system, Helvetica, Arial, sans-serif"
          font-weight="400" font-size="12" fill="#93c5fd" fill-opacity="0.6" letter-spacing="0.2">static analysis · deps · field refs</text>
  </g>

  <!-- ===== EXECUTE NODE (bottom-left) ===== -->
  <g transform="translate(90, 260)">
    <rect x="0" y="0" width="200" height="80" rx="12"
          fill="#c4b5fd" fill-opacity="0.08" stroke="#c4b5fd" stroke-width="1.5" stroke-opacity="0.5"/>
    <g transform="translate(16, 14)">
      <polygon points="0,0 16,10 0,20" fill="none" stroke="#c4b5fd" stroke-width="1.3" stroke-opacity="0.7"/>
    </g>
    <text x="40" y="30" font-family="Plus Jakarta Sans, -apple-system, Helvetica, Arial, sans-serif"
          font-weight="700" font-size="18" fill="#c4b5fd" letter-spacing="-0.3">Execute</text>
    <text x="16" y="58" font-family="Plus Jakarta Sans, -apple-system, Helvetica, Arial, sans-serif"
          font-weight="400" font-size="12" fill="#c4b5fd" fill-opacity="0.6" letter-spacing="0.2">DAG orchestration · parallel · batch</text>
  </g>

  <!-- ===== CYCLE ARROWS ===== -->

  <!-- Define → Validate: right edge of Define (500,90) curving down to top-left of Validate (530,270) -->
  <path d="M 500,105 Q 570,160 530,260"
        fill="none" stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="6,4" stroke-opacity="0.45"
        marker-end="url(#arr-blue)"/>

  <!-- Validate → Execute: left edge of Validate (510,300) curving across to right edge of Execute (290,300) -->
  <path d="M 510,310 Q 400,370 290,310"
        fill="none" stroke="#c4b5fd" stroke-width="1.5" stroke-dasharray="6,4" stroke-opacity="0.45"
        marker-end="url(#arr-purple)"/>

  <!-- Execute → Define: top of Execute (190,260) curving up to left edge of Define (300,105) -->
  <path d="M 160,260 Q 180,170 300,105"
        fill="none" stroke="#86efac" stroke-width="1.5" stroke-dasharray="6,4" stroke-opacity="0.45"
        marker-end="url(#arr-green)"/>

  <!-- ===== CENTER LOGO ===== -->
  <g transform="translate(365, 170) scale(0.55)">
    <rect x="8" y="20" width="13" height="54" rx="4" fill="#94a3b8" opacity="1" transform="rotate(-30 14 68)"/>
    <rect x="28" y="22" width="13" height="56" rx="4" fill="#e2e8f0" opacity="0.45" transform="rotate(-15 34 76)"/>
    <rect x="50" y="22" width="13" height="60" rx="4" fill="#e2e8f0" opacity="0.65" transform="rotate(-5 56 80)"/>
    <rect x="72" y="18" width="15" height="68" rx="4" fill="#e2e8f0" opacity="1"/>
  </g>

  <!-- ===== WORKS AT ANY SCALE ===== -->
  <text x="400" y="405" text-anchor="middle"
        font-family="Plus Jakarta Sans, -apple-system, Helvetica, Arial, sans-serif"
        font-weight="500" font-size="11" fill="#71717a" letter-spacing="2.5">WORKS AT ANY SCALE</text>

  <!-- Online badge -->
  <g transform="translate(155, 425)">
    <rect x="0" y="0" width="130" height="36" rx="18"
          fill="#86efac" fill-opacity="0.06" stroke="#86efac" stroke-width="1" stroke-opacity="0.15"/>
    <g transform="translate(16, 9)">
      <path d="M10,0 L4,10 L8,10 L6,18 L14,7 L9,7 Z"
            fill="none" stroke="#86efac" stroke-width="1.2" stroke-opacity="0.7" stroke-linejoin="round"/>
    </g>
    <text x="40" y="23" font-family="Plus Jakarta Sans, -apple-system, Helvetica, Arial, sans-serif"
          font-weight="600" font-size="13" fill="#86efac" fill-opacity="0.8">Online</text>
  </g>

  <!-- Batch badge -->
  <g transform="translate(315, 425)">
    <rect x="0" y="0" width="130" height="36" rx="18"
          fill="#93c5fd" fill-opacity="0.06" stroke="#93c5fd" stroke-width="1" stroke-opacity="0.15"/>
    <g transform="translate(16, 9)">
      <rect x="0" y="0" width="16" height="5" rx="1" fill="none" stroke="#93c5fd" stroke-width="1.2" stroke-opacity="0.7"/>
      <rect x="2" y="7" width="12" height="5" rx="1" fill="none" stroke="#93c5fd" stroke-width="1.2" stroke-opacity="0.5"/>
      <rect x="4" y="13" width="8" height="4" rx="1" fill="none" stroke="#93c5fd" stroke-width="1.2" stroke-opacity="0.3"/>
    </g>
    <text x="40" y="23" font-family="Plus Jakarta Sans, -apple-system, Helvetica, Arial, sans-serif"
          font-weight="600" font-size="13" fill="#93c5fd" fill-opacity="0.8">Batch</text>
  </g>

  <!-- Multi-vendor badge -->
  <g transform="translate(475, 425)">
    <rect x="0" y="0" width="160" height="36" rx="18"
          fill="#fbbf24" fill-opacity="0.06" stroke="#fbbf24" stroke-width="1" stroke-opacity="0.15"/>
    <g transform="translate(16, 8)">
      <rect x="0" y="0" width="7" height="7" rx="1.5" fill="none" stroke="#fbbf24" stroke-width="1.2" stroke-opacity="0.7"/>
      <rect x="10" y="0" width="7" height="7" rx="1.5" fill="none" stroke="#fbbf24" stroke-width="1.2" stroke-opacity="0.7"/>
      <rect x="0" y="10" width="7" height="7" rx="1.5" fill="none" stroke="#fbbf24" stroke-width="1.2" stroke-opacity="0.5"/>
      <rect x="10" y="10" width="7" height="7" rx="1.5" fill="none" stroke="#fbbf24" stroke-width="1.2" stroke-opacity="0.5"/>
    </g>
    <text x="44" y="23" font-family="Plus Jakarta Sans, -apple-system, Helvetica, Arial, sans-serif"
          font-weight="600" font-size="13" fill="#fbbf24" fill-opacity="0.8">Multi-vendor</text>
  </g>

  <!-- Bottom accent -->
  <rect x="365" y="485" width="70" height="2" rx="1" fill="#94a3b8" opacity="0.2"/>
</svg>
