<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520" viewBox="0 0 800 520">
  <defs>
    <!-- Arrow markers -->
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#5a7a94" stroke-width="1.2" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#7a6d91" stroke-width="1.2" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#4d7c5a" stroke-width="1.2" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" fill="#fafaf9"/>

  <!-- Subtle grid -->
  <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
    <path d="M 64 0 L 0 0 0 64" fill="none" stroke="rgba(0,0,0,0.03)" stroke-width="1"/>
  </pattern>
  <rect width="800" height="520" fill="url(#grid)"/>

  <!-- ===== DEFINE NODE (top center) ===== -->
  <g transform="translate(300, 50)">
    <rect x="0" y="0" width="200" height="80" rx="12"
          fill="#4d7c5a" fill-opacity="0.07" stroke="#4d7c5a" stroke-width="1.5" stroke-opacity="0.35"/>
    <g transform="translate(16, 14)">
      <rect x="0" y="0" width="16" height="20" rx="2" fill="none" stroke="#4d7c5a" stroke-width="1.3" stroke-opacity="0.6"/>
      <line x1="4" y1="6" x2="12" y2="6" stroke="#4d7c5a" stroke-width="1" stroke-opacity="0.4"/>
      <line x1="4" y1="10" x2="10" y2="10" stroke="#4d7c5a" stroke-width="1" stroke-opacity="0.4"/>
      <line x1="4" y1="14" x2="8" y2="14" stroke="#4d7c5a" stroke-width="1" stroke-opacity="0.4"/>
    </g>
    <text x="40" y="30" font-family="Plus Jakarta Sans, -apple-system, Helvetica, Arial, sans-serif"
          font-weight="700" font-size="18" fill="#4d7c5a" letter-spacing="-0.3">Define</text>
    <text x="16" y="58" font-family="Plus Jakarta Sans, -apple-system, Helvetica, Arial, sans-serif"
          font-weight="400" font-size="12" fill="#4d7c5a" fill-opacity="0.6" letter-spacing="0.2">YAML · prompts · schemas</text>
  </g>

  <!-- ===== VALIDATE NODE (bottom-right) ===== -->
  <g transform="translate(510, 260)">
    <rect x="0" y="0" width="200" height="80" rx="12"
          fill="#5a7a94" fill-opacity="0.07" stroke="#5a7a94" stroke-width="1.5" stroke-opacity="0.35"/>
    <g transform="translate(16, 14)">
      <path d="M8,1 L15,4 L15,11 Q15,18 8,21 Q1,18 1,11 L1,4 Z"
            fill="none" stroke="#5a7a94" stroke-width="1.3" stroke-opacity="0.6"/>
      <polyline points="5,11 7.5,14 12,8" fill="none" stroke="#5a7a94" stroke-width="1.3" stroke-opacity="0.6"/>
    </g>
    <text x="40" y="30" font-family="Plus Jakarta Sans, -apple-system, Helvetica, Arial, sans-serif"
          font-weight="700" font-size="18" fill="#5a7a94" letter-spacing="-0.3">Validate</text>
    <text x="16" y="58" font-family="Plus Jakarta Sans, -apple-system, Helvetica, Arial, sans-serif"
          font-weight="400" font-size="12" fill="#5a7a94" fill-opacity="0.6" letter-spacing="0.2">static analysis · deps · field refs</text>
  </g>

  <!-- ===== EXECUTE NODE (bottom-left) ===== -->
  <g transform="translate(90, 260)">
    <rect x="0" y="0" width="200" height="80" rx="12"
          fill="#7a6d91" fill-opacity="0.07" stroke="#7a6d91" stroke-width="1.5" stroke-opacity="0.35"/>
    <g transform="translate(16, 14)">
      <polygon points="0,0 16,10 0,20" fill="none" stroke="#7a6d91" stroke-width="1.3" stroke-opacity="0.6"/>
    </g>
    <text x="40" y="30" font-family="Plus Jakarta Sans, -apple-system, Helvetica, Arial, sans-serif"
          font-weight="700" font-size="18" fill="#7a6d91" letter-spacing="-0.3">Execute</text>
    <text x="16" y="58" font-family="Plus Jakarta Sans, -apple-system, Helvetica, Arial, sans-serif"
          font-weight="400" font-size="12" fill="#7a6d91" fill-opacity="0.6" letter-spacing="0.2">DAG orchestration · parallel · batch</text>
  </g>

  <!-- ===== CYCLE ARROWS ===== -->

  <!-- Define → Validate -->
  <path d="M 500,105 Q 570,160 530,260"
        fill="none" stroke="#5a7a94" stroke-width="1.5" stroke-dasharray="6,4" stroke-opacity="0.4"
        marker-end="url(#arr-blue)"/>

  <!-- Validate → Execute -->
  <path d="M 510,310 Q 400,370 290,310"
        fill="none" stroke="#7a6d91" stroke-width="1.5" stroke-dasharray="6,4" stroke-opacity="0.4"
        marker-end="url(#arr-purple)"/>

  <!-- Execute → Define -->
  <path d="M 160,260 Q 180,170 300,105"
        fill="none" stroke="#4d7c5a" stroke-width="1.5" stroke-dasharray="6,4" stroke-opacity="0.4"
        marker-end="url(#arr-green)"/>

  <!-- ===== CENTER LOGO ===== -->
  <g transform="translate(365, 170) scale(0.55)">
    <rect x="8" y="20" width="13" height="54" rx="4" fill="#64748b" opacity="1" transform="rotate(-30 14 68)"/>
    <rect x="28" y="22" width="13" height="56" rx="4" fill="#334155" opacity="0.4" transform="rotate(-15 34 76)"/>
    <rect x="50" y="22" width="13" height="60" rx="4" fill="#334155" opacity="0.6" transform="rotate(-5 56 80)"/>
    <rect x="72" y="18" width="15" height="68" rx="4" fill="#334155" opacity="1"/>
  </g>

  <!-- ===== WORKS AT ANY SCALE ===== -->
  <text x="400" y="405" text-anchor="middle"
        font-family="Plus Jakarta Sans, -apple-system, Helvetica, Arial, sans-serif"
        font-weight="500" font-size="11" fill="#94a3b8" letter-spacing="2.5">WORKS AT ANY SCALE</text>

  <!-- Online badge -->
  <g transform="translate(155, 425)">
    <rect x="0" y="0" width="130" height="36" rx="18"
          fill="#4d7c5a" fill-opacity="0.06" stroke="#4d7c5a" stroke-width="1" stroke-opacity="0.2"/>
    <g transform="translate(16, 9)">
      <path d="M10,0 L4,10 L8,10 L6,18 L14,7 L9,7 Z"
            fill="none" stroke="#4d7c5a" stroke-width="1.2" stroke-opacity="0.6" stroke-linejoin="round"/>
    </g>
    <text x="40" y="23" font-family="Plus Jakarta Sans, -apple-system, Helvetica, Arial, sans-serif"
          font-weight="600" font-size="13" fill="#4d7c5a" fill-opacity="0.8">Online</text>
  </g>

  <!-- Batch badge -->
  <g transform="translate(315, 425)">
    <rect x="0" y="0" width="130" height="36" rx="18"
          fill="#5a7a94" fill-opacity="0.06" stroke="#5a7a94" stroke-width="1" stroke-opacity="0.2"/>
    <g transform="translate(16, 9)">
      <rect x="0" y="0" width="16" height="5" rx="1" fill="none" stroke="#5a7a94" stroke-width="1.2" stroke-opacity="0.6"/>
      <rect x="2" y="7" width="12" height="5" rx="1" fill="none" stroke="#5a7a94" stroke-width="1.2" stroke-opacity="0.4"/>
      <rect x="4" y="13" width="8" height="4" rx="1" fill="none" stroke="#5a7a94" stroke-width="1.2" stroke-opacity="0.25"/>
    </g>
    <text x="40" y="23" font-family="Plus Jakarta Sans, -apple-system, Helvetica, Arial, sans-serif"
          font-weight="600" font-size="13" fill="#5a7a94" fill-opacity="0.8">Batch</text>
  </g>

  <!-- Multi-vendor badge -->
  <g transform="translate(475, 425)">
    <rect x="0" y="0" width="160" height="36" rx="18"
          fill="#8a7356" fill-opacity="0.06" stroke="#8a7356" stroke-width="1" stroke-opacity="0.2"/>
    <g transform="translate(16, 8)">
      <rect x="0" y="0" width="7" height="7" rx="1.5" fill="none" stroke="#8a7356" stroke-width="1.2" stroke-opacity="0.6"/>
      <rect x="10" y="0" width="7" height="7" rx="1.5" fill="none" stroke="#8a7356" stroke-width="1.2" stroke-opacity="0.6"/>
      <rect x="0" y="10" width="7" height="7" rx="1.5" fill="none" stroke="#8a7356" stroke-width="1.2" stroke-opacity="0.4"/>
      <rect x="10" y="10" width="7" height="7" rx="1.5" fill="none" stroke="#8a7356" stroke-width="1.2" stroke-opacity="0.4"/>
    </g>
    <text x="44" y="23" font-family="Plus Jakarta Sans, -apple-system, Helvetica, Arial, sans-serif"
          font-weight="600" font-size="13" fill="#8a7356" fill-opacity="0.8">Multi-vendor</text>
  </g>

  <!-- Bottom accent -->
  <rect x="365" y="485" width="70" height="2" rx="1" fill="#475569" opacity="0.2"/>
</svg>
