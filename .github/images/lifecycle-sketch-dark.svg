<svg xmlns="http://www.w3.org/2000/svg" width="680" height="480" viewBox="0 0 680 480">
  <defs>
    <!-- Wobble filter — artist level -->
    <filter id="wobble" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="2" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>

    <!-- Glow filters for each color -->
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feFlood flood-color="#4ade80" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feFlood flood-color="#67e8f9" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Dark-theme hatching patterns -->
    <pattern id="hatch-green-dark" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="8" height="8" fill="#0f2a18"/>
      <line x1="0" y1="0" x2="0" y2="8" stroke="#2d6b3f" stroke-width="1.5" opacity="0.5"/>
    </pattern>
    <pattern id="hatch-cyan-dark" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="8" height="8" fill="#0a2530"/>
      <line x1="0" y1="0" x2="0" y2="8" stroke="#2a7088" stroke-width="1.5" opacity="0.5"/>
    </pattern>

    <!-- Dashed arrow marker -->
    <marker id="arrowhead-green" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto">
      <polygon points="0,1 12,5 0,9 2,5" fill="#4ade80"/>
    </marker>
    <marker id="arrowhead-cyan" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto">
      <polygon points="0,1 12,5 0,9 2,5" fill="#67e8f9"/>
    </marker>
    <marker id="arrowhead-dim" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto">
      <polygon points="0,1 12,5 0,9 2,5" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Dark background -->
  <rect width="680" height="480" fill="#0d1117" rx="12"/>

  <!-- ============================================================ -->
  <!-- CIRCULAR DASHED ARROWS (behind boxes) -->
  <!-- ============================================================ -->

  <!-- Define → Validate (top-right arc) -->
  <path d="M 420,108 C 480,120 530,170 520,235"
    fill="none" stroke="#4ade80" stroke-width="2" stroke-linecap="round"
    stroke-dasharray="8,5" opacity="0.6"
    marker-end="url(#arrowhead-green)" filter="url(#wobble)"/>

  <!-- Validate → Execute (bottom arc) -->
  <path d="M 440,290 C 400,340 280,340 230,290"
    fill="none" stroke="#67e8f9" stroke-width="2" stroke-linecap="round"
    stroke-dasharray="8,5" opacity="0.6"
    marker-end="url(#arrowhead-cyan)" filter="url(#wobble)"/>

  <!-- Execute → Define (left-top arc) -->
  <path d="M 160,218 C 150,160 200,105 260,90"
    fill="none" stroke="#6b7280" stroke-width="2" stroke-linecap="round"
    stroke-dasharray="8,5" opacity="0.5"
    marker-end="url(#arrowhead-dim)" filter="url(#wobble)"/>

  <!-- ============================================================ -->
  <!-- CENTER LOGO AREA -->
  <!-- ============================================================ -->
  <g transform="translate(318, 195)" opacity="0.35">
    <rect x="0" y="0" width="6" height="35" rx="2" fill="#e5e7eb" transform="rotate(-10, 3, 17)"/>
    <rect x="12" y="-4" width="6" height="40" rx="2" fill="#d1d5db" transform="rotate(-5, 15, 17)"/>
    <rect x="24" y="0" width="6" height="35" rx="2" fill="#9ca3af" transform="rotate(0, 27, 17)"/>
    <rect x="36" y="4" width="6" height="30" rx="2" fill="#6b7280" transform="rotate(5, 39, 17)"/>
  </g>

  <!-- ============================================================ -->
  <!-- BOX 1: DEFINE (top center) -->
  <!-- ============================================================ -->
  <g filter="url(#glow-green)">
    <path d="
      M 277,50 Q 320,47 340,52 Q 370,48 403,50
      Q 407,72 405,85 Q 407,98 403,120
      Q 370,123 340,118 Q 310,122 277,120
      Q 273,98 275,85 Q 273,72 277,50 Z"
      fill="url(#hatch-green-dark)" stroke="#4ade80" stroke-width="2" filter="url(#wobble)"/>
  </g>

  <!-- Pencil icon -->
  <g transform="translate(295, 65)" filter="url(#wobble)">
    <line x1="0" y1="20" x2="16" y2="0" stroke="#4ade80" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="20" x2="4" y2="22" stroke="#4ade80" stroke-width="2" stroke-linecap="round"/>
  </g>

  <text x="352" y="82" text-anchor="middle"
    font-family="Segoe Print, Comic Sans MS, Bradley Hand, cursive"
    font-size="22" font-weight="bold" fill="#4ade80">Define</text>
  <text x="340" y="106" text-anchor="middle"
    font-family="Segoe Print, Comic Sans MS, Bradley Hand, cursive"
    font-size="12" fill="#86efac" opacity="0.8">YAML · prompts · schemas</text>

  <!-- ============================================================ -->
  <!-- BOX 2: VALIDATE (right) -->
  <!-- ============================================================ -->
  <g filter="url(#glow-cyan)">
    <path d="
      M 437,225 Q 480,222 510,227 Q 545,223 573,225
      Q 577,250 575,262 Q 577,275 573,297
      Q 545,300 510,295 Q 475,299 437,297
      Q 433,275 435,262 Q 433,250 437,225 Z"
      fill="url(#hatch-cyan-dark)" stroke="#67e8f9" stroke-width="2" filter="url(#wobble)"/>
  </g>

  <!-- Checkmark icon -->
  <g transform="translate(453, 242)" filter="url(#wobble)">
    <circle cx="10" cy="10" r="9" fill="none" stroke="#67e8f9" stroke-width="1.5"/>
    <polyline points="5,10 9,14 16,6" fill="none" stroke="#67e8f9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="520" y="260" text-anchor="middle"
    font-family="Segoe Print, Comic Sans MS, Bradley Hand, cursive"
    font-size="22" font-weight="bold" fill="#67e8f9">Validate</text>
  <text x="505" y="284" text-anchor="middle"
    font-family="Segoe Print, Comic Sans MS, Bradley Hand, cursive"
    font-size="12" fill="#a5f3fc" opacity="0.8">static analysis · deps · field refs</text>

  <!-- ============================================================ -->
  <!-- BOX 3: EXECUTE (left) -->
  <!-- ============================================================ -->
  <g filter="url(#glow-green)">
    <path d="
      M 107,225 Q 150,222 175,227 Q 210,223 243,225
      Q 247,250 245,262 Q 247,275 243,297
      Q 210,300 175,295 Q 140,299 107,297
      Q 103,275 105,262 Q 103,250 107,225 Z"
      fill="url(#hatch-green-dark)" stroke="#4ade80" stroke-width="2" filter="url(#wobble)"/>
  </g>

  <!-- Play triangle icon -->
  <g transform="translate(122, 242)" filter="url(#wobble)">
    <polygon points="0,0 18,10 0,20" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-linejoin="round"/>
  </g>

  <text x="187" y="260" text-anchor="middle"
    font-family="Segoe Print, Comic Sans MS, Bradley Hand, cursive"
    font-size="22" font-weight="bold" fill="#4ade80">Execute</text>
  <text x="175" y="284" text-anchor="middle"
    font-family="Segoe Print, Comic Sans MS, Bradley Hand, cursive"
    font-size="12" fill="#86efac" opacity="0.8">DAG orchestration · parallel · batch</text>

  <!-- ============================================================ -->
  <!-- BOTTOM: "WORKS AT ANY SCALE" + PILLS -->
  <!-- ============================================================ -->

  <text x="340" y="378" text-anchor="middle"
    font-family="Segoe Print, Comic Sans MS, Bradley Hand, cursive"
    font-size="11" fill="#6b7280" letter-spacing="3">WORKS AT ANY SCALE</text>

  <!-- Online pill -->
  <g filter="url(#wobble)">
    <path d="M 112,400 Q 140,397 168,400 Q 195,397 212,400
      Q 215,412 213,418 Q 215,424 212,436
      Q 185,439 162,436 Q 138,439 112,436
      Q 109,424 111,418 Q 109,412 112,400 Z"
      fill="none" stroke="#4ade80" stroke-width="1.5" opacity="0.7"/>
  </g>
  <!-- Lightning icon -->
  <g transform="translate(130, 408)" opacity="0.8">
    <polyline points="8,0 3,10 9,10 4,20" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="175" y="423" text-anchor="middle"
    font-family="Segoe Print, Comic Sans MS, Bradley Hand, cursive"
    font-size="14" fill="#4ade80" opacity="0.9">Online</text>

  <!-- Batch pill -->
  <g filter="url(#wobble)">
    <path d="M 262,400 Q 296,397 320,400 Q 347,397 370,400
      Q 373,412 371,418 Q 373,424 370,436
      Q 343,439 318,436 Q 293,439 262,436
      Q 259,424 261,418 Q 259,412 262,400 Z"
      fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.7"/>
  </g>
  <!-- Stack icon -->
  <g transform="translate(280, 410)" opacity="0.8">
    <rect x="0" y="0" width="14" height="4" rx="1" fill="none" stroke="#67e8f9" stroke-width="1"/>
    <rect x="0" y="6" width="14" height="4" rx="1" fill="none" stroke="#67e8f9" stroke-width="1"/>
    <rect x="0" y="12" width="14" height="4" rx="1" fill="none" stroke="#67e8f9" stroke-width="1"/>
  </g>
  <text x="330" y="423" text-anchor="middle"
    font-family="Segoe Print, Comic Sans MS, Bradley Hand, cursive"
    font-size="14" fill="#67e8f9" opacity="0.9">Batch</text>

  <!-- Multi-vendor pill -->
  <g filter="url(#wobble)">
    <path d="M 418,400 Q 460,397 495,400 Q 533,397 568,400
      Q 571,412 569,418 Q 571,424 568,436
      Q 535,439 498,436 Q 460,439 418,436
      Q 415,424 417,418 Q 415,412 418,400 Z"
      fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.7"/>
  </g>
  <!-- Grid icon -->
  <g transform="translate(435, 408)" opacity="0.8">
    <rect x="0" y="0" width="6" height="6" rx="1" fill="none" stroke="#fbbf24" stroke-width="1"/>
    <rect x="8" y="0" width="6" height="6" rx="1" fill="none" stroke="#fbbf24" stroke-width="1"/>
    <rect x="0" y="8" width="6" height="6" rx="1" fill="none" stroke="#fbbf24" stroke-width="1"/>
    <rect x="8" y="8" width="6" height="6" rx="1" fill="none" stroke="#fbbf24" stroke-width="1"/>
  </g>
  <text x="510" y="423" text-anchor="middle"
    font-family="Segoe Print, Comic Sans MS, Bradley Hand, cursive"
    font-size="14" fill="#fbbf24" opacity="0.9">Multi-vendor</text>

</svg>
