# Multi-Step Workflow Template
# Demonstrates a pipeline with multiple sequential actions
# Each action reads output from previous actions and adds new fields

# Workflow-level configuration applies to all actions
model_vendor: openai
model_name: gpt-4o-mini
api_key: ${OPENAI_API_KEY}

# Temperature setting for all actions (can be overridden per action)
temperature: 0.7

# Actions execute in order, building a processing pipeline
actions:
  # STEP 1: Extract key information from raw text
  - name: extract_info

    reads:
      - raw_text          # Input field from source data

    writes:
      - entities          # Extracted named entities
      - key_phrases       # Important phrases
      - topics            # Main topics discussed

    prompt: |
      Analyze the following text and extract key information.

      Text:
      {{ raw_text }}

      Please identify:
      1. Named entities (people, organizations, locations)
      2. Key phrases and important terms
      3. Main topics or themes

    schema:
      entities:
        type: array
        items: string
      key_phrases:
        type: array
        items: string
      topics:
        type: array
        items: string

  # STEP 2: Analyze sentiment based on extracted information
  - name: analyze_sentiment

    reads:
      - raw_text          # Original text
      - entities          # From previous action
      - topics            # From previous action

    writes:
      - sentiment         # Overall sentiment
      - sentiment_score   # Numerical score
      - confidence        # Confidence level

    prompt: |
      Based on the text and extracted information, analyze the sentiment.

      Original Text:
      {{ raw_text }}

      Entities Mentioned: {{ entities | join(', ') }}
      Topics: {{ topics | join(', ') }}

      Provide a sentiment analysis including:
      1. Overall sentiment (positive/negative/neutral)
      2. Sentiment score (-1.0 to 1.0)
      3. Confidence level (0.0 to 1.0)

    schema:
      sentiment:
        type: string
        enum: [positive, negative, neutral]
      sentiment_score:
        type: number
        minimum: -1.0
        maximum: 1.0
      confidence:
        type: number
        minimum: 0.0
        maximum: 1.0

    # Override temperature for more consistent scoring
    temperature: 0.3

  # STEP 3: Generate a comprehensive summary
  - name: create_summary

    reads:
      - raw_text          # Original text
      - entities          # From step 1
      - topics            # From step 1
      - sentiment         # From step 2

    writes:
      - summary           # Final comprehensive summary
      - word_count        # Summary length

    prompt: |
      Create a comprehensive summary of the following text, incorporating
      the extracted entities, topics, and sentiment analysis.

      Original Text:
      {{ raw_text }}

      Key Entities: {{ entities | join(', ') }}
      Main Topics: {{ topics | join(', ') }}
      Sentiment: {{ sentiment }}

      Provide a well-structured summary that:
      1. Captures the main points
      2. Mentions key entities and topics
      3. Reflects the sentiment appropriately
      4. Is concise but informative (100-150 words)

    schema:
      summary: string
      word_count: integer

  # STEP 4: Generate actionable insights
  - name: generate_insights

    reads:
      - topics            # From step 1
      - sentiment         # From step 2
      - sentiment_score   # From step 2
      - summary           # From step 3

    writes:
      - insights          # Key insights
      - recommendations   # Actionable recommendations

    prompt: |
      Based on the analysis, generate insights and recommendations.

      Topics: {{ topics | join(', ') }}
      Sentiment: {{ sentiment }} (score: {{ sentiment_score }})
      Summary: {{ summary }}

      Provide:
      1. 3-5 key insights from the content
      2. 2-3 actionable recommendations

    schema:
      insights:
        type: array
        items: string
        minItems: 3
        maxItems: 5
      recommendations:
        type: array
        items: string
        minItems: 2
        maxItems: 3

# ============================================================================
# USAGE EXAMPLE
# ============================================================================
# Save this file as: workflows/analyze.yml
#
# Then run:
#   agac run analyze --input articles.jsonl
#
# Input data format (articles.jsonl):
#   {"raw_text": "Article text here..."}
#   {"raw_text": "Another article..."}
#
# Output format (final result after all 4 steps):
#   {
#     "raw_text": "...",
#     "entities": ["Entity1", "Entity2"],
#     "key_phrases": ["phrase1", "phrase2"],
#     "topics": ["topic1", "topic2"],
#     "sentiment": "positive",
#     "sentiment_score": 0.7,
#     "confidence": 0.85,
#     "summary": "Comprehensive summary...",
#     "word_count": 120,
#     "insights": ["insight1", "insight2", "insight3"],
#     "recommendations": ["rec1", "rec2"]
#   }

# ============================================================================
# DATA FLOW
# ============================================================================
# This workflow demonstrates how data flows through actions:
#
# Input: { raw_text: "..." }
#    ↓
# Step 1 (extract_info):
#    Adds: entities, key_phrases, topics
#    ↓
# Step 2 (analyze_sentiment):
#    Reads: raw_text, entities, topics
#    Adds: sentiment, sentiment_score, confidence
#    ↓
# Step 3 (create_summary):
#    Reads: raw_text, entities, topics, sentiment
#    Adds: summary, word_count
#    ↓
# Step 4 (generate_insights):
#    Reads: topics, sentiment, sentiment_score, summary
#    Adds: insights, recommendations
#    ↓
# Output: { all accumulated fields }

# ============================================================================
# BEST PRACTICES
# ============================================================================
# 1. ORDER MATTERS: Actions execute sequentially
# 2. READ DEPENDENCIES: Each action can read any field written by previous actions
# 3. WRITE UNIQUE: Each action should write to different fields (no overwrites)
# 4. TEMPERATURE: Adjust per action (low for structured tasks, higher for creative)
# 5. SCHEMAS: Define clear schemas to ensure consistent output structure
# 6. PROMPTS: Reference previous fields using Jinja2 syntax {{ field_name }}

# ============================================================================
# CUSTOMIZATION IDEAS
# ============================================================================
# Adapt this multi-step pattern for different workflows:
#
# 1. RESEARCH PIPELINE:
#    - Extract claims → Verify facts → Generate report → Create citations
#
# 2. CONTENT CREATION:
#    - Generate outline → Write sections → Add examples → Format output
#
# 3. DATA PROCESSING:
#    - Parse data → Validate → Transform → Enrich → Export
#
# 4. ANALYSIS PIPELINE:
#    - Categorize → Extract metrics → Compare → Generate insights
