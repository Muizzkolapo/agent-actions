name: interpret_statistical_signals
description: Schema for LLM interpretation of aggregated statistical detection results
fields:
  - id: signal_summary
    type: string
    description: "Human-readable summary of what the statistical signals collectively indicate"
  - id: strongest_indicators
    type: array
    items:
      type: string
    description: "The most significant statistical signals and why they matter"
  - id: weak_signals
    type: array
    items:
      type: string
    description: "Subtle or borderline signals that individually are inconclusive but together may be meaningful"
  - id: potential_false_positives
    type: array
    items:
      type: string
    description: "Statistical signals that might be triggered by legitimate prompts and why"
  - id: cross_layer_correlations
    type: string
    description: "Analysis of how signals across different layers reinforce or contradict each other"
  - id: statistical_confidence
    type: string
    description: "Assessment of statistical confidence: strong, moderate, weak, or contradictory"
required:
  - signal_summary
  - strongest_indicators
  - cross_layer_correlations
  - statistical_confidence
additionalProperties: false
