name: generate_safe_report
description: Schema for LLM-generated clearance or review report when a prompt is classified as PASS or REVIEW
fields:
  - id: report_title
    type: string
    description: "Concise title (e.g., 'Prompt Cleared: Standard Technical Request' or 'Prompt Flagged for Review: Ambiguous Intent')"
  - id: executive_summary
    type: string
    description: "2-3 sentence summary of the assessment and decision rationale"
  - id: decision_rationale
    type: string
    description: "Detailed explanation of why this prompt was cleared or flagged for review rather than blocked"
  - id: residual_risk_factors
    type: array
    items:
      type: string
    description: "Any remaining risk factors or concerns, even if overall assessment is safe"
  - id: detection_notes
    type: string
    description: "Summary of what the detection layers found and why it was deemed acceptable"
  - id: review_guidance
    type: string
    description: "For REVIEW decisions: specific guidance on what a human reviewer should look for. For PASS: confirmation of safe passage."
  - id: monitoring_recommendations
    type: array
    items:
      type: string
    description: "Ongoing monitoring recommendations (e.g., watch for follow-up prompts from same session)"
required:
  - report_title
  - executive_summary
  - decision_rationale
  - detection_notes
  - review_guidance
additionalProperties: false
