name: generate_response
description: Professional merchant response drafted for a product review
fields:
  - id: response_text
    type: string
    description: "The merchant response to be posted publicly"
  - id: response_tone
    type: string
    description: "Tone of the response: grateful, empathetic, solution-oriented, or professional"
  - id: addresses_concerns
    type: boolean
    description: "Whether the response directly addresses specific concerns raised"
  - id: includes_action_item
    type: boolean
    description: "Whether the response commits to a specific follow-up action"
required:
  - response_text
  - response_tone
