################################################################################
# Candidate Screener Workflow
################################################################################
# Description: Automated candidate screening system that parses resumes,
#              runs parallel assessments (skills, experience, culture fit),
#              combines scores, and generates hire/no-hire recommendations.
#
# Showcases:
#   - Parallel fan-in from DIFFERENT assessments (not voting/ensemble)
#   - Each parallel branch evaluates a distinct dimension independently
#   - Weighted composite scoring via tool action
#   - Guard-based filtering on composite score
#   - Context isolation: each assessor sees only what it needs
################################################################################

name: candidate_screener
description: "Parallel multi-dimension candidate screening with weighted fan-in"
version: "1.0.0"

defaults:
  json_mode: true
  granularity: Record
  run_mode: online
  model_vendor: openai
  model_name: gpt-4o-mini
  api_key: OPENAI_API_KEY
  context_scope:
    seed_path:
      role_requirements: $file:role_requirements.json
      company_values: $file:company_values.json

actions:
  # ==========================================================================
  # STAGE 1: PARSE RESUME — Extract structured data from raw text
  # ==========================================================================
  - name: parse_resume
    intent: "Extract structured candidate data from resume text and cover letter"
    schema: candidate_screener/parse_resume
    prompt: $candidate_screener.Parse_Resume
    context_scope:
      observe:
        - source.resume_text
        - source.cover_letter
      passthrough:
        - source.application_id
        - source.candidate_name
        - source.role_applied

  # ==========================================================================
  # STAGE 2a: ASSESS SKILLS — Technical skill match (parallel branch 1)
  # ==========================================================================
  # Sees: parsed skills + previous roles + role requirements
  # Does NOT see: experience depth assessment or culture fit assessment
  - name: assess_skills
    dependencies: [parse_resume]
    intent: "Evaluate technical skill match against role requirements"
    schema: candidate_screener/assess_skills
    prompt: $candidate_screener.Assess_Skills
    context_scope:
      observe:
        - parse_resume.skills
        - parse_resume.previous_roles
        - parse_resume.role_applied
      drop:
        - parse_resume.notable_achievements
        - parse_resume.education

  # ==========================================================================
  # STAGE 2b: ASSESS EXPERIENCE — Depth of experience (parallel branch 2)
  # ==========================================================================
  # Sees: work history + achievements + role requirements
  # Does NOT see: skill match assessment or culture fit assessment
  - name: assess_experience
    dependencies: [parse_resume]
    intent: "Evaluate depth and relevance of professional experience"
    schema: candidate_screener/assess_experience
    prompt: $candidate_screener.Assess_Experience
    context_scope:
      observe:
        - parse_resume.previous_roles
        - parse_resume.experience_years
        - parse_resume.notable_achievements
        - parse_resume.education
        - parse_resume.role_applied

  # ==========================================================================
  # STAGE 2c: ASSESS CULTURE FIT — Values alignment (parallel branch 3)
  # ==========================================================================
  # Sees: achievements + cover letter + company values
  # Does NOT see: skill assessment or experience assessment
  - name: assess_culture_fit
    dependencies: [parse_resume]
    intent: "Evaluate alignment with company values and team culture"
    schema: candidate_screener/assess_culture_fit
    prompt: $candidate_screener.Assess_Culture_Fit
    context_scope:
      observe:
        - parse_resume.notable_achievements
        - parse_resume.communication_style
        - source.cover_letter
      drop:
        - parse_resume.skills
        - parse_resume.experience_years

  # ==========================================================================
  # STAGE 3: COMBINE SCORES — Weighted composite (fan-in from 3 branches)
  # ==========================================================================
  - name: combine_scores
    dependencies: [assess_skills, assess_experience, assess_culture_fit]
    kind: tool
    impl: calculate_composite_score
    intent: "Calculate weighted composite score from all three assessment dimensions"
    context_scope:
      observe:
        - assess_skills.*
        - assess_experience.*
        - assess_culture_fit.*
      passthrough:
        - parse_resume.candidate_name
        - parse_resume.role_applied

  # ==========================================================================
  # STAGE 4: GENERATE RECOMMENDATION — Hire/no-hire (guarded)
  # ==========================================================================
  # Only generates a detailed recommendation for candidates scoring >= 6
  - name: generate_recommendation
    dependencies: [combine_scores]
    intent: "Generate detailed hire/no-hire recommendation with justification"
    guard:
      condition: 'composite_score >= 6'
      on_false: "filter"
    schema: candidate_screener/generate_recommendation
    prompt: $candidate_screener.Generate_Recommendation
    context_scope:
      observe:
        - combine_scores.*
        - parse_resume.candidate_name
        - parse_resume.role_applied
