name: parse_resume
description: Schema for structured data extracted from a candidate's resume and cover letter
fields:
  - id: candidate_name
    type: string
    description: "Full name of the candidate"
  - id: role_applied
    type: string
    description: "Role the candidate applied for (normalized key)"
  - id: skills
    type: array
    items:
      type: object
      properties:
        name:
          type: string
          description: "Skill name (e.g., Python, System Design)"
        proficiency:
          type: string
          description: "Estimated proficiency: beginner, intermediate, advanced, expert"
        years:
          type: number
          description: "Approximate years of experience with this skill"
    description: "Technical and professional skills extracted from resume"
  - id: previous_roles
    type: array
    items:
      type: object
      properties:
        title:
          type: string
          description: "Job title"
        company:
          type: string
          description: "Company name"
        duration_years:
          type: number
          description: "Approximate duration in years"
        key_responsibilities:
          type: array
          items:
            type: string
          description: "Key responsibilities and accomplishments"
    description: "Work history extracted from resume"
  - id: experience_years
    type: number
    description: "Total years of professional experience"
  - id: education
    type: array
    items:
      type: object
      properties:
        degree:
          type: string
          description: "Degree earned (e.g., B.S., M.S., Ph.D., MBA)"
        field:
          type: string
          description: "Field of study"
        institution:
          type: string
          description: "University or institution name"
    description: "Educational background"
  - id: notable_achievements
    type: array
    items:
      type: string
    description: "Quantifiable achievements, publications, patents, or awards"
  - id: communication_style
    type: string
    description: "Brief assessment of the candidate's communication style based on resume and cover letter writing quality"
required:
  - candidate_name
  - role_applied
  - skills
  - previous_roles
  - experience_years
  - education
additionalProperties: false
