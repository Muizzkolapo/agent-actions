name: generate_recommendation
description: Schema for final hire/no-hire recommendation with justification
fields:
  - id: decision
    type: string
    description: "Final recommendation: STRONG_HIRE, HIRE, or NO_HIRE"
  - id: confidence
    type: number
    description: "Confidence in the recommendation (0.0-1.0)"
  - id: summary
    type: string
    description: "2-3 sentence executive summary of the candidate"
  - id: strengths
    type: array
    items:
      type: string
    description: "Top 3-5 candidate strengths relevant to the role"
  - id: concerns
    type: array
    items:
      type: string
    description: "Key concerns or risks to discuss in interview"
  - id: interview_focus_areas
    type: array
    items:
      type: string
    description: "Suggested topics to probe during interviews"
  - id: compensation_guidance
    type: string
    description: "Brief note on level/compensation expectations based on experience"
  - id: next_steps
    type: string
    description: "Recommended next steps (e.g., phone screen, technical interview, skip to onsite)"
required:
  - decision
  - confidence
  - summary
  - strengths
  - concerns
  - interview_focus_areas
  - next_steps
additionalProperties: false
