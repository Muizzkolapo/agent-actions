name: assess_skills
description: Schema for technical skill match assessment
fields:
  - id: skills_score
    type: number
    description: "Overall skill match score (1-10 scale)"
  - id: must_have_coverage
    type: array
    items:
      type: object
      properties:
        requirement:
          type: string
          description: "The must-have requirement"
        met:
          type: boolean
          description: "Whether the candidate meets this requirement"
        evidence:
          type: string
          description: "Evidence from resume supporting the assessment"
    description: "Assessment of each must-have requirement"
  - id: nice_to_have_coverage
    type: array
    items:
      type: object
      properties:
        requirement:
          type: string
          description: "The nice-to-have requirement"
        met:
          type: boolean
          description: "Whether the candidate meets this requirement"
        evidence:
          type: string
          description: "Evidence from resume supporting the assessment"
    description: "Assessment of each nice-to-have requirement"
  - id: skill_gaps
    type: array
    items:
      type: string
    description: "Key skill gaps relative to role requirements"
  - id: skill_strengths
    type: array
    items:
      type: string
    description: "Notable skill strengths beyond requirements"
  - id: skills_reasoning
    type: string
    description: "Detailed reasoning for the skills score"
required:
  - skills_score
  - must_have_coverage
  - skill_gaps
  - skills_reasoning
additionalProperties: false
