name: assess_culture_fit
description: Schema for culture fit and values alignment assessment
fields:
  - id: culture_score
    type: number
    description: "Overall culture fit score (1-10 scale)"
  - id: values_alignment
    type: array
    items:
      type: object
      properties:
        value:
          type: string
          description: "Company value name"
        alignment:
          type: string
          description: "Alignment level: strong, moderate, weak, no-signal"
        evidence:
          type: string
          description: "Evidence from resume or cover letter"
    description: "Alignment assessment for each company value"
  - id: communication_quality
    type: string
    description: "Assessment of written communication: poor, adequate, good, excellent"
  - id: motivation_signals
    type: array
    items:
      type: string
    description: "Signals about candidate's motivation and career intent"
  - id: culture_risks
    type: array
    items:
      type: string
    description: "Potential culture fit concerns"
  - id: culture_reasoning
    type: string
    description: "Detailed reasoning for the culture score"
required:
  - culture_score
  - values_alignment
  - communication_quality
  - culture_reasoning
additionalProperties: false
