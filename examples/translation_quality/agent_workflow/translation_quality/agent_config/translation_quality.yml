################################################################################
# Translation Quality Pipeline
################################################################################
# An iterative refinement showcase: parallel translation strategies, best
# selection, back-translation validation, and quality scoring.
#
# Patterns demonstrated:
#   - Parallel versioned strategies (literal, idiomatic, domain-adapted)
#   - Version consumption with merge pattern (fan-in from parallel)
#   - Back-translation validation loop (translate → reverse → compare)
#   - Seed data injection (domain glossary)
#   - Guard / reprompt on quality threshold
#   - Progressive context disclosure (observe / drop / passthrough)
#   - Deterministic tool steps for selection and formatting
#
# Workflow:
#   1. Extract context        (LLM — identify domain, tone, key terms)
#   2. Translate x3 parallel  (LLM — literal, idiomatic, domain-adapted)
#   3. Select best            (Tool — deterministic comparison + scoring)
#   4. Back-translate          (LLM — reverse translate to source language)
#   5. Validate quality       (LLM — compare original vs back-translation)
#   6. Format output          (Tool — package final result with metadata)
################################################################################
name: translation_quality
description: "Translation quality pipeline with parallel strategies, back-translation validation, and iterative refinement scoring"
version: "1.0.0"

defaults:
  json_mode: true
  granularity: Record
  run_mode: batch
  model_vendor: openai
  model_name: gpt-4o-mini
  api_key: OPENAI_API_KEY
  is_operational: true
  context_scope:
    seed_path:
      glossary: $file:domain_glossary.json

  data_source:
    type: local
    folder: ./staging
    file_type: [json]

actions:

  # ═══════════════════════════════════════════════════════════════════════════
  # STEP 1: EXTRACT CONTEXT
  # ═══════════════════════════════════════════════════════════════════════════
  # Analyzes the source text to identify domain, tone, key terminology,
  # cultural references, and translation challenges BEFORE any translation
  # happens. This context steers all three translation strategies.
  # ═══════════════════════════════════════════════════════════════════════════
  - name: extract_context
    intent: "Identify domain, tone, key terms, and cultural references in source text"
    schema: translation_quality/extract_context
    prompt: $translation_quality.Extract_Context
    context_scope:
      observe:
        - source.text                          # ← Source text to analyze
        - source.target_language               # ← Target language affects term mapping
        - source.domain                        # ← Domain hint for glossary lookup
        - seed_data.glossary                   # ← Domain terminology reference
      passthrough:
        - source.text_id                       # ← Flows to output, zero tokens
        - source.source_language
        - source.target_language
        - source.domain
        - source.text
    retry:
      enabled: true
      max_attempts: 3

  # ═══════════════════════════════════════════════════════════════════════════
  # STEP 2: TRANSLATE (3 parallel strategies)
  # ═══════════════════════════════════════════════════════════════════════════
  # Three translators work independently with different strategies:
  #   - Version 1 (first): Literal — preserves source structure and terms
  #   - Version 2 (middle): Idiomatic — prioritizes natural target-language flow
  #   - Version 3 (last): Domain-adapted — uses glossary terms and conventions
  #
  # Each sees the source text and extracted context but NEVER each other's
  # translations. This is context isolation for independent judgment.
  # ═══════════════════════════════════════════════════════════════════════════
  - name: translate
    dependencies: [extract_context]
    intent: "Translate the source text using a specific strategy"
    schema: translation_quality/translate
    prompt: $translation_quality.Translate
    versions:
      param: strategy                          # ← 3 parallel translators
      range: [1, 2, 3]
      mode: parallel
    context_scope:
      observe:
        - source.text                          # ← Original text to translate
        - source.target_language               # ← Target language
        - source.domain                        # ← Domain context
        - extract_context.detected_tone        # ← Tone from analysis
        - extract_context.key_terms            # ← Important terms identified
        - extract_context.cultural_references  # ← Cultural refs to handle
        - extract_context.translation_challenges # ← Known challenges
        - seed_data.glossary                   # ← Domain glossary
      passthrough:
        - source.text_id
        - source.source_language

  # ═══════════════════════════════════════════════════════════════════════════
  # STEP 3: SELECT BEST TRANSLATION
  # ═══════════════════════════════════════════════════════════════════════════
  # Deterministic tool merges 3 parallel translations and picks the best.
  # Scores by completeness (sentence coverage) and reported confidence.
  # No LLM needed — selection logic is transparent and reproducible.
  # ═══════════════════════════════════════════════════════════════════════════
  - name: select_best_translation
    dependencies: [translate]
    kind: tool
    impl: compare_translations
    intent: "Compare three translation strategies and select the best candidate"
    schema: translation_quality/select_best_translation
    version_consumption:
      source: translate                        # ← Declarative fan-in
      pattern: merge                           #    from 3 parallel versions
    context_scope:
      observe:
        - translate.*                          # ← All three translations
        - source.text                          # ← Original for reference
      passthrough:
        - extract_context.*                    # ← Pass analysis downstream
        - source.text_id
        - source.source_language
        - source.target_language
        - source.domain

  # ═══════════════════════════════════════════════════════════════════════════
  # STEP 4: BACK-TRANSLATE
  # ═══════════════════════════════════════════════════════════════════════════
  # Translates the best translation BACK to the source language. This is the
  # core of the iterative refinement pattern: if meaning is preserved through
  # a round-trip, the translation is faithful.
  #
  # The back-translator does NOT see the original text — it works only from
  # the translated version. This prevents it from "cheating" by copying.
  # ═══════════════════════════════════════════════════════════════════════════
  - name: back_translate
    dependencies: [select_best_translation]
    intent: "Translate the selected best translation back to the source language"
    schema: translation_quality/back_translate
    prompt: $translation_quality.Back_Translate
    context_scope:
      observe:
        - select_best_translation.best_translation  # ← Only sees the translation
        - source.source_language                     # ← Target for back-translation
        - source.target_language                     # ← Source of the translation
        - source.domain                              # ← Domain context
      drop:
        - source.text                                # ← CRITICAL: hide original text
      passthrough:
        - select_best_translation.best_translation
        - select_best_translation.selected_strategy
        - select_best_translation.selection_reasoning
        - source.text_id
        - source.source_language
        - source.target_language
        - source.domain
        - extract_context.*

  # ═══════════════════════════════════════════════════════════════════════════
  # STEP 5: VALIDATE QUALITY
  # ═══════════════════════════════════════════════════════════════════════════
  # Compares the original text against the back-translation to detect meaning
  # drift, omissions, and distortions. Produces a quality score (1-10) and
  # flags specific issues.
  #
  # This is the "judge" step. It sees everything: original, translation,
  # back-translation, and extracted context. It decides whether the
  # translation is faithful enough to ship.
  # ═══════════════════════════════════════════════════════════════════════════
  - name: validate_quality
    dependencies: [back_translate]
    intent: "Compare back-translation against original to detect meaning drift"
    schema: translation_quality/validate_quality
    prompt: $translation_quality.Validate_Quality
    context_scope:
      observe:
        - source.text                                    # ← Original text
        - select_best_translation.best_translation       # ← Forward translation
        - back_translate.back_translated_text             # ← Round-trip result
        - extract_context.key_terms                      # ← Terms to verify
        - extract_context.cultural_references            # ← Cultural refs to check
        - extract_context.detected_tone                  # ← Tone preservation
        - source.domain                                  # ← Domain context
      passthrough:
        - source.text_id
        - source.source_language
        - source.target_language
        - source.domain
        - source.text
        - select_best_translation.best_translation
        - select_best_translation.selected_strategy
        - select_best_translation.selection_reasoning
        - back_translate.back_translated_text
        - extract_context.*

  # ═══════════════════════════════════════════════════════════════════════════
  # STEP 6: FORMAT OUTPUT
  # ═══════════════════════════════════════════════════════════════════════════
  # Deterministic tool packages the final translation with full quality
  # metadata: scores, strategy used, drift analysis, and key term handling.
  # ═══════════════════════════════════════════════════════════════════════════
  - name: format_output
    dependencies: [validate_quality]
    kind: tool
    impl: format_translation_output
    intent: "Package final translation with quality metadata and validation results"
    schema: translation_quality/format_output
    context_scope:
      observe:
        - validate_quality.*
        - select_best_translation.*
        - back_translate.*
        - extract_context.*
        - source.*
