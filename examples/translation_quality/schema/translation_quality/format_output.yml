name: format_output
description: Final packaged translation with quality metadata and validation results
fields:
  - id: text_id
    type: string
    description: "Original text identifier"
  - id: source_language
    type: string
    description: "Source language code"
  - id: target_language
    type: string
    description: "Target language code"
  - id: domain
    type: string
    description: "Text domain (legal, medical, marketing, technical, casual)"
  - id: translation
    type: object
    description: "The final translation and strategy metadata"
    properties:
      text:
        type: string
        description: "The final translated text"
      strategy:
        type: string
        description: "The winning translation strategy"
      confidence:
        type: number
        description: "Confidence score from the selected translator"
  - id: quality
    type: object
    description: "Quality validation results"
    properties:
      score:
        type: number
        description: "Overall quality score (1-10)"
      meaning_preserved:
        type: boolean
      tone_preserved:
        type: boolean
      drift_count:
        type: number
        description: "Number of meaning drifts detected"
      critical_issues:
        type: number
        description: "Number of critical drift issues"
  - id: back_translation
    type: string
    description: "The back-translated text for reference"
  - id: original_text
    type: string
    description: "The original source text"
  - id: summary
    type: string
    description: "Quality assessment summary"
required:
  - text_id
  - source_language
  - target_language
  - domain
  - translation
  - quality
