name: select_best_translation
description: Best translation selected from three parallel strategy candidates
fields:
  - id: best_translation
    type: string
    description: "The selected best translation text"
  - id: selected_strategy
    type: string
    description: "Which strategy produced the winning translation (literal, idiomatic, or domain_adapted)"
  - id: selection_reasoning
    type: string
    description: "Why this translation was selected over the alternatives"
  - id: scores
    type: object
    description: "Comparison scores for all three candidates"
    properties:
      literal:
        type: object
        properties:
          completeness:
            type: number
          confidence:
            type: number
          total:
            type: number
      idiomatic:
        type: object
        properties:
          completeness:
            type: number
          confidence:
            type: number
          total:
            type: number
      domain_adapted:
        type: object
        properties:
          completeness:
            type: number
          confidence:
            type: number
          total:
            type: number
  - id: all_translations
    type: object
    description: "All three translation candidates for reference"
    properties:
      literal:
        type: string
      idiomatic:
        type: string
      domain_adapted:
        type: string
required:
  - best_translation
  - selected_strategy
  - selection_reasoning
  - scores
