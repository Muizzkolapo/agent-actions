name: validate_quality
description: Quality validation comparing original text against back-translation
fields:
  - id: quality_score
    type: number
    description: "Overall translation quality score (1-10)"
  - id: meaning_preserved
    type: boolean
    description: "Whether the core meaning survived the round-trip translation"
  - id: drift_issues
    type: array
    description: "Specific meaning drifts detected between original and back-translation"
    items:
      type: object
      properties:
        original_segment:
          type: string
          description: "The segment from the original text"
        back_translated_segment:
          type: string
          description: "How it came back after round-trip"
        drift_type:
          type: string
          description: "Type of drift: omission, addition, distortion, or softening"
        severity:
          type: string
          description: "Impact level: critical, moderate, or minor"
  - id: tone_preserved
    type: boolean
    description: "Whether the tone and register were maintained"
  - id: key_term_accuracy
    type: array
    description: "Verification of how key domain terms were handled"
    items:
      type: object
      properties:
        term:
          type: string
        correctly_translated:
          type: boolean
        note:
          type: string
  - id: quality_summary
    type: string
    description: "Brief assessment of the translation quality and any recommended improvements"
required:
  - quality_score
  - meaning_preserved
  - drift_issues
  - tone_preserved
  - quality_summary
