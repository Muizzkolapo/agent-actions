################################################################################
# Contract Reviewer Workflow (Map-Reduce Pattern)
################################################################################
# Description: Splits contracts into clauses, analyzes each for risk,
#              aggregates findings, and generates an executive summary.
#
# Showcases:
#   - Map-Reduce: split document -> process per-clause -> aggregate per-file
#   - FILE granularity aggregation (sees ALL clauses at once)
#   - Context scoping with observe/passthrough/drop
#   - Seed data enrichment (risk criteria reference)
################################################################################

name: contract_reviewer
description: "Map-Reduce contract review: split into clauses, analyze risk per clause, aggregate into unified risk report"
version: "1.0.0"

defaults:
  json_mode: true
  granularity: Record
  is_operational: true
  run_mode: online
  model_vendor: gemini
  model_name: gemini-flash-lite-latest
  api_key: GEMINI_API_KEY
  record_limit: 2      # Remove for full processing
  context_scope:
    seed_path:
      risk_criteria: $file:risk_criteria.json
  retry:
    enabled: true
    max_attempts: 2

actions:

  # ==========================================================================
  # STAGE 1: MAP — Split contract into individual clauses
  # ==========================================================================
  # Tool action that parses the full_text and emits one record per clause.
  # This is the "map" step: one contract in, N clauses out.
  # ==========================================================================
  - name: split_into_clauses
    kind: tool
    impl: split_contract_by_clause
    intent: "Split contract full_text into individual numbered clauses"
    schema: split_into_clauses
    context_scope:
      observe:
        - source.full_text
        - source.contract_id
        - source.title
      passthrough:
        - source.contract_id
        - source.title
        - source.parties

  # ==========================================================================
  # STAGE 2: PROCESS — Analyze each clause for risk and obligations
  # ==========================================================================
  # LLM action using Anthropic for better legal reasoning.
  # Runs per-clause (Record granularity). Each clause is analyzed independently
  # against the risk criteria from seed data.
  # ==========================================================================
  - name: analyze_clause
    dependencies: [split_into_clauses]
    intent: "Analyze a single contract clause for risk level, obligations, and deadlines"
    schema: analyze_clause
    prompt: $contract_reviewer.Analyze_Clause
    reprompt:
      validation: check_required_fields
      max_attempts: 2
      on_exhausted: return_last
    # model_vendor: anthropic                   # Uncomment for stronger legal analysis
    # model_name: claude-sonnet-4-20250514
    # api_key: ANTHROPIC_API_KEY
    context_scope:
      observe:
        - split_into_clauses.clause_number
        - split_into_clauses.clause_title
        - split_into_clauses.clause_text
        - seed.risk_criteria
      passthrough:
        - split_into_clauses.clause_number
        - split_into_clauses.clause_title
        - source.contract_id
        - source.title
        - source.parties

  # ==========================================================================
  # STAGE 3: REDUCE — Aggregate all clause analyses into unified risk report
  # ==========================================================================
  # FILE granularity tool: sees ALL clause records at once.
  # Combines clause-level analyses into a single contract-level risk report.
  # This is the "reduce" step: N clauses in, one summary out.
  # ==========================================================================
  - name: aggregate_risk_summary
    dependencies: [analyze_clause]
    kind: tool
    impl: aggregate_clause_analyses
    intent: "Aggregate all clause analyses into a unified contract risk report"
    schema: aggregate_risk_summary
    granularity: File
    context_scope:
      observe:
        - analyze_clause.*
        - source.contract_id
        - source.title
        - source.parties

  # ==========================================================================
  # STAGE 4: SUMMARIZE — Generate human-readable executive risk summary
  # ==========================================================================
  # LLM action that takes the aggregated risk report and produces a
  # narrative executive summary. Does NOT see individual clause analyses
  # to keep the context focused and the summary high-level.
  # ==========================================================================
  - name: generate_executive_summary
    dependencies: [aggregate_risk_summary]
    intent: "Generate a human-readable executive risk summary from the aggregated report"
    schema: generate_executive_summary
    prompt: $contract_reviewer.Generate_Executive_Summary
    context_scope:
      observe:
        - aggregate_risk_summary.*
      drop:                                   # Keep summary high-level
        - analyze_clause.clause_number
        - analyze_clause.clause_text
        - analyze_clause.clause_title
        - analyze_clause.deadlines
        - analyze_clause.obligations
        - analyze_clause.reasoning
        - analyze_clause.recommended_action
        - analyze_clause.risk_criteria
        - analyze_clause.risk_indicators
        - analyze_clause.risk_level
        - analyze_clause.risk_score
        - split_into_clauses.clause_number
        - split_into_clauses.clause_text
        - split_into_clauses.clause_title
        - split_into_clauses.contract_id
        - split_into_clauses.full_text
        - split_into_clauses.title
