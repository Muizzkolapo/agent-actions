name: deduplicate_faqs
description: Deduplication check result
fields:
  - id: dedup_status
    type: string
    description: "\"new\", \"update\", or \"duplicate\""
  - id: matched_faq_id
    type: string
    description: "ID of matched existing FAQ (null if new)"
  - id: overlap_reasoning
    type: string
    description: "Why this is new/update/duplicate"
  - id: suggested_action
    type: string
    description: "\"publish_new\", \"update_existing\", or \"skip\""
required:
  - dedup_status
  - overlap_reasoning
  - suggested_action
