name: format_faq_output
description: Final packaged FAQ entry
fields:
  - id: faq_id
    type: string
    description: "Generated FAQ identifier"
  - id: question
    type: string
    description: "Final FAQ question"
  - id: answer
    type: string
    description: "Final FAQ answer"
  - id: category
    type: string
    description: "FAQ category"
  - id: status
    type: string
    description: "\"new\" or \"update\""
  - id: source_ticket_count
    type: number
    description: "Number of source tickets"
  - id: source_ticket_ids
    type: array
    description: "Ticket IDs that informed this"
  - id: alternative_phrasings
    type: array
    description: "Alternative question phrasings"
  - id: matched_existing_faq_id
    type: string
    description: "If updating an existing FAQ"
required:
  - faq_id
  - question
  - answer
  - category
  - status
