name: aggregate_classification
description: Aggregated topic votes
fields:
  - id: consensus_category
    type: string
    description: "Majority-rule category"
  - id: vote_agreement
    type: number
    description: "Fraction of voters that agreed (0.33, 0.67, 1.0)"
  - id: is_unanimous
    type: boolean
    description: "Whether all voters agreed"
  - id: vote_summary
    type: string
    description: "Summary of individual votes"
required:
  - consensus_category
  - vote_agreement
  - vote_summary
