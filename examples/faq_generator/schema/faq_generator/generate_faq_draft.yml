name: generate_faq_draft
description: Generated FAQ entry
fields:
  - id: faq_question
    type: string
    description: "The FAQ question in customer-facing language"
  - id: faq_answer
    type: string
    description: "The FAQ answer, 2-4 sentences"
  - id: faq_category
    type: string
    description: "Category for the FAQ"
  - id: source_ticket_count
    type: number
    description: "How many tickets informed this FAQ"
  - id: alternative_phrasings
    type: array
    description: "2-3 alternative ways customers might ask this"
required:
  - faq_question
  - faq_answer
  - faq_category
