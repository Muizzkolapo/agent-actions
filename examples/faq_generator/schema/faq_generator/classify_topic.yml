name: classify_topic
description: Topic classification output
fields:
  - id: assigned_category
    type: string
    description: "The FAQ category from the taxonomy"
  - id: confidence
    type: number
    description: "Classification confidence 0-1"
  - id: reasoning
    type: string
    description: "Why this category was chosen"
required:
  - assigned_category
  - confidence
  - reasoning
