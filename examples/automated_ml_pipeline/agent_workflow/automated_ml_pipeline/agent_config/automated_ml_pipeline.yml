################################################################################
# Automated ML Pipeline Workflow (Dataiku-inspired)
################################################################################
# Description: End-to-end automated machine learning pipeline from data ingestion
#              to model deployment with quality checks and monitoring
#
# Showcases:
#   - Sequential pipeline stages with quality gates
#   - Parallel model training with multiple algorithms (loop pattern)
#   - Model evaluation and selection
#   - Conditional deployment based on performance thresholds
#   - Seed data enrichment (feature store, model registry)
################################################################################

name: automated_ml_pipeline
description: "Automated end-to-end ML pipeline with model selection and deployment"
version: "1.0.0"

defaults:
  json_mode: true
  granularity: Record
  run_mode: online
  model_vendor: openai
  model_name: gpt-4o-mini
  api_key: OPENAI_API_KEY
  context_scope:
    seed_path:
      feature_definitions: $file:feature_definitions.json
      model_registry: $file:model_registry.json
      deployment_config: $file:deployment_config.json

actions:
  # ==========================================================================
  # STAGE 1: DATA QUALITY ASSESSMENT
  # ==========================================================================
  - name: assess_data_quality
    intent: "Assess data quality and identify issues"
    schema: automated_ml_pipeline/assess_data_quality
    prompt: $automated_ml_pipeline.Assess_Data_Quality
    context_scope:
      observe:
        - source.training_data
        - source.validation_data

  # ==========================================================================
  # STAGE 2: DATA QUALITY GATE (halt if quality too low)
  # ==========================================================================
  - name: data_quality_check
    dependencies: [assess_data_quality]
    kind: tool
    impl: validate_data_quality_threshold
    intent: "Validate data meets quality threshold"
    guard:
      condition: 'quality_score >= 0.7'
      on_false: "filter"
    context_scope:
      observe:
        - assess_data_quality.*

  # ==========================================================================
  # STAGE 3: FEATURE ENGINEERING RECOMMENDATIONS
  # ==========================================================================
  - name: recommend_features
    dependencies: [data_quality_check]
    intent: "Recommend feature engineering transformations"
    schema: automated_ml_pipeline/recommend_features
    prompt: $automated_ml_pipeline.Recommend_Features
    context_scope:
      observe:
        - data_quality_check.*
        - assess_data_quality.data_profile
        - source.training_data

  # ==========================================================================
  # STAGE 4: FEATURE ENGINEERING EXECUTION
  # ==========================================================================
  - name: execute_feature_engineering
    dependencies: [recommend_features]
    kind: tool
    impl: apply_feature_transformations
    intent: "Apply recommended feature transformations to dataset"
    context_scope:
      observe:
        - recommend_features.transformation_pipeline
        - recommend_features.encoding_strategies
        - source.training_data
        - source.validation_data
      passthrough:
        - assess_data_quality.*
        - recommend_features.*

  # ==========================================================================
  # STAGE 5: PARALLEL MODEL TRAINING (3 algorithms)
  # ==========================================================================
  - name: train_model
    dependencies: [execute_feature_engineering]
    intent: "Train ML model using specified algorithm"
    versions:
      range: [1, 3]
      mode: parallel
    schema: automated_ml_pipeline/train_model
    prompt: $automated_ml_pipeline.Train_Model
    context_scope:
      observe:
        - execute_feature_engineering.transformed_features
        - execute_feature_engineering.feature_names
        - recommend_features.recommended_features

  # ==========================================================================
  # STAGE 6: PARALLEL MODEL EVALUATION
  # ==========================================================================
  - name: evaluate_model
    dependencies: [train_model]
    intent: "Evaluate trained model on validation set"
    versions:
      range: [1, 3]
      mode: parallel
    schema: automated_ml_pipeline/evaluate_model
    prompt: $automated_ml_pipeline.Evaluate_Model
    version_consumption:
      source: train_model
      pattern: match
    context_scope:
      observe:
        - train_model.*
        - execute_feature_engineering.transformed_features

  # ==========================================================================
  # STAGE 7: MODEL SELECTION
  # ==========================================================================
  - name: select_best_model
    dependencies: [evaluate_model]
    kind: tool
    impl: select_champion_model
    intent: "Select best performing model based on business metrics"
    version_consumption:
      source: evaluate_model
      pattern: merge
    context_scope:
      observe:
        - evaluate_model.*
      passthrough:
        - recommend_features.*
        - execute_feature_engineering.*

  # ==========================================================================
  # STAGE 8: MODEL INTERPRETATION & EXPLAINABILITY
  # ==========================================================================
  - name: generate_model_explanations
    dependencies: [select_best_model]
    intent: "Generate model interpretability and explainability artifacts"
    schema: automated_ml_pipeline/generate_model_explanations
    prompt: $automated_ml_pipeline.Generate_Model_Explanations
    context_scope:
      observe:
        - select_best_model.champion_model
        - select_best_model.champion_metrics
        - recommend_features.recommended_features

  # ==========================================================================
  # STAGE 9: DEPLOYMENT READINESS CHECK
  # ==========================================================================
  - name: assess_deployment_readiness
    dependencies: [select_best_model, generate_model_explanations]
    intent: "Assess if model is ready for production deployment"
    schema: automated_ml_pipeline/assess_deployment_readiness
    prompt: $automated_ml_pipeline.Assess_Deployment_Readiness
    context_scope:
      observe:
        - select_best_model.*
      passthrough:
        - generate_model_explanations.*

  # ==========================================================================
  # STAGE 10: CONDITIONAL DEPLOYMENT (only if ready)
  # ==========================================================================
  - name: deploy_model
    dependencies: [assess_deployment_readiness]
    kind: tool
    impl: deploy_model_to_production
    intent: "Deploy model to production if readiness criteria met"
    guard:
      condition: 'deployment_ready == true and readiness_score >= 0.8'
      on_false: "filter"
    context_scope:
      observe:
        - select_best_model.champion_model
        - select_best_model.champion_algorithm
        - generate_model_explanations.*
      passthrough:
        - assess_data_quality.*
        - recommend_features.*
        - execute_feature_engineering.*
        - select_best_model.*

  # ==========================================================================
  # STAGE 11: GENERATE PIPELINE REPORT
  # ==========================================================================
  - name: generate_pipeline_report
    dependencies: [assess_deployment_readiness]
    kind: tool
    impl: format_ml_pipeline_report
    intent: "Generate comprehensive pipeline execution report"
    context_scope:
      observe:
        - assess_data_quality.*
        - recommend_features.*
        - execute_feature_engineering.*
        - select_best_model.*
        - generate_model_explanations.*
        - assess_deployment_readiness.*
        - deploy_model.*
