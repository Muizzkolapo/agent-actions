name: deploy_model
description: Schema for production model deployment result
fields:
  - id: deployment_id
    type: string
    description: "Unique identifier for this deployment"
  - id: deployment_status
    type: string
    description: "Deployment outcome: SUCCESS or FAILED"
  - id: deployed_model
    type: string
    description: "Model ID that was deployed"
  - id: deployed_algorithm
    type: string
    description: "Algorithm name of the deployed model"
  - id: deployment_timestamp
    type: string
    description: "ISO 8601 timestamp of deployment"
  - id: deployment_environment
    type: string
    description: "Target environment (e.g. production)"
  - id: deployment_steps
    type: array
    items:
      type: object
    description: "Step-by-step deployment execution log"
  - id: deployment_summary
    type: object
    description: "Summary including endpoint_url, monitoring_dashboard, rollback_available"
  - id: post_deployment_checks
    type: object
    description: "Results of health, latency, and throughput checks"
required:
  - deployment_id
  - deployment_status
  - deployed_model
additionalProperties: false
