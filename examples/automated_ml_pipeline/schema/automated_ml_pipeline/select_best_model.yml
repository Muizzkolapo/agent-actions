name: select_best_model
description: Schema for champion model selection from parallel evaluations
fields:
  - id: champion_model
    type: string
    description: "Model ID of the selected champion model"
  - id: champion_algorithm
    type: string
    description: "Algorithm name of the champion model"
  - id: champion_metrics
    type: object
    description: "Validation metrics of the champion model"
  - id: champion_score
    type: number
    description: "Composite weighted score used for selection"
  - id: champion_feature_importance
    type: object
    description: "Feature importance scores for the champion model"
  - id: selection_reasoning
    type: string
    description: "Human-readable explanation of why this model was selected"
  - id: model_comparison
    type: array
    items:
      type: object
    description: "Ranked comparison table of all evaluated models"
  - id: runner_up
    type: object
    description: "Second-best model details, null if only one model"
required:
  - champion_model
  - champion_algorithm
  - champion_metrics
  - model_comparison
additionalProperties: false
