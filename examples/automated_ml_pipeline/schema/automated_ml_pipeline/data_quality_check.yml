name: data_quality_check
description: Schema for data quality threshold validation gate
fields:
  - id: validation_passed
    type: boolean
    description: "True if all quality thresholds were met"
  - id: quality_score
    type: number
    description: "Overall data quality score (0.0-1.0)"
  - id: threshold_results
    type: object
    description: "Per-dimension threshold evaluation results (quality, completeness, consistency)"
  - id: critical_issues
    type: array
    items:
      type: object
    description: "List of HIGH severity issues that block pipeline"
  - id: blocking_reason
    type: [string, "null"]
    description: "Human-readable reason why validation failed, null if passed"
required:
  - validation_passed
  - quality_score
additionalProperties: false
