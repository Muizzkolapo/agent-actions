name: execute_feature_engineering
description: Schema for feature engineering transformation execution
fields:
  - id: transformed_features
    type: array
    items:
      type: object
    description: "Transformed feature data after applying pipeline steps"
  - id: feature_names
    type: array
    items:
      type: string
    description: "Names of all features produced by transformations and encoding"
  - id: transformation_log
    type: array
    items:
      type: object
    description: "Step-by-step log of applied transformations"
  - id: transformation_summary
    type: object
    description: "Summary stats: total_steps, features_created, encoding_applied"
required:
  - feature_names
  - transformation_log
additionalProperties: false
