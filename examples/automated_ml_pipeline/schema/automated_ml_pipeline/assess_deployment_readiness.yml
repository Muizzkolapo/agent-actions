name: assess_deployment_readiness
description: Schema for ML model deployment readiness assessment
fields:
  - id: deployment_ready
    type: boolean
    description: "Whether model is ready for production"
  - id: readiness_score
    type: number
    description: "Overall readiness score (0.0-1.0)"
  - id: checklist_results
    type: object
    description: "Status of each deployment requirement"
  - id: identified_risks
    type: array
    items:
      type: object
    description: "Identified risks with severity and mitigation"
  - id: deployment_recommendation
    type: string
    description: "Detailed recommendation with reasoning"
required:
  - deployment_ready
  - readiness_score
  - deployment_recommendation
additionalProperties: false
