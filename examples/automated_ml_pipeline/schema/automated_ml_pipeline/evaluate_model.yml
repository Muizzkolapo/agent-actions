name: evaluate_model
description: Schema for model evaluation metrics
fields:
  - id: model_id
    type: string
    description: "Model identifier being evaluated"
  - id: algorithm
    type: string
    description: "Algorithm of the model"
  - id: validation_metrics
    type: object
    description: "Validation metrics including accuracy, precision, recall, f1_score, auc_roc"
  - id: confusion_matrix
    type: object
    description: "Confusion matrix breakdown"
  - id: feature_importance
    type: object
    description: "Feature importance scores"
  - id: prediction_examples
    type: array
    items:
      type: object
    description: "Sample predictions with explanations"
required:
  - model_id
  - validation_metrics
additionalProperties: false
