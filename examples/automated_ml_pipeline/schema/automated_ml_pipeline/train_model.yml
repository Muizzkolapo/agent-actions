name: train_model
description: Schema for model training configuration and results
fields:
  - id: model_id
    type: string
    description: "Unique model identifier"
  - id: algorithm
    type: string
    description: "Algorithm used for training"
  - id: hyperparameters
    type: object
    description: "Hyperparameters used for training"
  - id: training_metrics
    type: object
    description: "Metrics from training process"
  - id: training_time
    type: number
    description: "Time taken to train the model"
  - id: model_size
    type: string
    description: "Estimated model size"
required:
  - model_id
  - algorithm
  - training_metrics
additionalProperties: false
