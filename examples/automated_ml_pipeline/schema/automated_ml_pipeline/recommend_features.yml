name: recommend_features
description: Schema for feature engineering recommendations
fields:
  - id: recommended_features
    type: array
    items:
      type: object
    description: "List of recommended features with name, type, source_columns, rationale"
  - id: transformation_pipeline
    type: array
    items:
      type: object
    description: "Ordered list of transformation steps"
  - id: feature_importance_estimates
    type: object
    description: "Expected importance scores for features"
  - id: encoding_strategies
    type: object
    description: "Encoding strategies for categorical columns"
required:
  - recommended_features
  - transformation_pipeline
additionalProperties: false
