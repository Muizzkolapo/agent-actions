name: generate_pipeline_report
description: Schema for comprehensive ML pipeline execution report
fields:
  - id: report_id
    type: string
    description: "Unique report identifier"
  - id: generated_at
    type: string
    description: "ISO 8601 timestamp when report was generated"
  - id: pipeline_summary
    type: object
    description: "Overall pipeline status, total stages, and stages passed"
  - id: stages
    type: object
    description: "Per-stage summaries: data_quality, feature_engineering, model_selection, model_explainability, deployment_readiness, deployment"
  - id: key_metrics
    type: object
    description: "Top-level metrics: data_quality_score, champion_model_score, deployment_readiness"
  - id: recommendations
    type: array
    items:
      type: string
    description: "Actionable recommendations based on pipeline results"
  - id: metadata
    type: object
    description: "Pipeline metadata: workflow_version, pipeline_type"
required:
  - report_id
  - pipeline_summary
  - stages
  - key_metrics
additionalProperties: false
