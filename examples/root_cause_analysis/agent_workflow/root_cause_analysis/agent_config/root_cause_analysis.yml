################################################################################
# Root Cause Analysis Workflow (CausalLens-inspired)
################################################################################
# Description: Automated root cause analysis using causal discovery and
#              reasoning to identify the true causes of system anomalies
#
# Showcases:
#   - Multi-level causal reasoning (immediate -> intermediate -> root causes)
#   - Causal graph construction and traversal
#   - Hypothesis generation and validation (loop pattern)
#   - Impact quantification
#   - Seed data enrichment (historical patterns, known issues)
################################################################################

name: root_cause_analysis
description: "Automated root cause analysis using causal discovery"
version: "1.0.0"

defaults:
  json_mode: true
  granularity: Record
  run_mode: online
  model_vendor: openai
  model_name: gpt-4o-mini
  api_key: OPENAI_API_KEY
  context_scope:
    seed_path:
      system_topology: $file:system_topology.json
      historical_incidents: $file:historical_incidents.json
      causal_patterns: $file:causal_patterns.json

actions:
  # ==========================================================================
  # STAGE 1: EXTRACT ANOMALY SIGNALS
  # ==========================================================================
  - name: extract_anomaly_signals
    intent: "Extract and structure anomaly signals from raw monitoring data"
    schema: root_cause_analysis/extract_anomaly_signals
    prompt: $root_cause_analysis.Extract_Anomaly_Signals
    context_scope:
      observe:
        - source.monitoring_data
        - source.alerts
        - source.logs

  # ==========================================================================
  # STAGE 2: PARALLEL HYPOTHESIS GENERATION (3 independent reasoners)
  # ==========================================================================
  - name: generate_hypotheses
    dependencies: [extract_anomaly_signals]
    intent: "Generate causal hypotheses using different reasoning strategies"
    versions:
      range: [1, 3]
      mode: parallel
    schema: root_cause_analysis/generate_hypotheses
    prompt: $root_cause_analysis.Generate_Hypotheses
    context_scope:
      observe:
        - extract_anomaly_signals.*

  # ==========================================================================
  # STAGE 3: AGGREGATE AND RANK HYPOTHESES
  # ==========================================================================
  - name: rank_hypotheses
    dependencies: [generate_hypotheses]
    kind: tool
    impl: rank_causal_hypotheses
    intent: "Aggregate hypotheses and rank by evidence strength"
    version_consumption:
      source: generate_hypotheses
      pattern: merge
    context_scope:
      observe:
        - generate_hypotheses.*
      passthrough:
        - extract_anomaly_signals.*

  # ==========================================================================
  # STAGE 4: VALIDATE TOP HYPOTHESES WITH EVIDENCE
  # ==========================================================================
  - name: validate_hypotheses
    dependencies: [rank_hypotheses]
    intent: "Validate top hypotheses against available evidence"
    schema: root_cause_analysis/validate_hypotheses
    prompt: $root_cause_analysis.Validate_Hypotheses
    context_scope:
      observe:
        - rank_hypotheses.top_hypotheses
        - extract_anomaly_signals.*
        - source.logs

  # ==========================================================================
  # STAGE 5: CONSTRUCT CAUSAL CHAIN
  # ==========================================================================
  - name: construct_causal_chain
    dependencies: [validate_hypotheses]
    intent: "Build the causal chain from root cause to observed symptoms"
    schema: root_cause_analysis/construct_causal_chain
    prompt: $root_cause_analysis.Construct_Causal_Chain
    context_scope:
      observe:
        - validate_hypotheses.*
        - extract_anomaly_signals.affected_components

  # ==========================================================================
  # STAGE 6: QUANTIFY IMPACT AND ESTIMATE EFFECT SIZE
  # ==========================================================================
  - name: quantify_impact
    dependencies: [construct_causal_chain]
    intent: "Quantify the impact of root cause on system behavior"
    schema: root_cause_analysis/quantify_impact
    prompt: $root_cause_analysis.Quantify_Impact
    context_scope:
      observe:
        - construct_causal_chain.*
        - extract_anomaly_signals.metric_deviations
        - source.monitoring_data

  # ==========================================================================
  # STAGE 7: GENERATE REMEDIATION RECOMMENDATIONS
  # ==========================================================================
  - name: generate_remediation
    dependencies: [construct_causal_chain, quantify_impact]
    kind: tool
    impl: generate_remediation_plan
    intent: "Generate remediation plan using historical fixes and topology"
    context_scope:
      observe:
        - construct_causal_chain.root_cause
        - construct_causal_chain.causal_mechanism
        - quantify_impact.*
      passthrough:
        - extract_anomaly_signals.*
        - validate_hypotheses.*

  # ==========================================================================
  # STAGE 8: FORMAT ANALYSIS OUTPUT
  # ==========================================================================
  - name: format_analysis_output
    dependencies: [generate_remediation]
    kind: tool
    impl: format_rca_report
    intent: "Format complete root cause analysis report"
    context_scope:
      observe:
        - extract_anomaly_signals.*
        - rank_hypotheses.*
        - validate_hypotheses.*
        - construct_causal_chain.*
        - quantify_impact.*
        - generate_remediation.*
