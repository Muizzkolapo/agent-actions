name: construct_causal_chain
description: Schema for causal chain construction
fields:
  - id: root_cause
    type: string
    description: "The ultimate root cause"
  - id: intermediate_causes
    type: array
    items:
      type: object
    description: "Chain of intermediate events"
  - id: causal_mechanism
    type: string
    description: "How the root cause leads to symptoms"
  - id: propagation_path
    type: array
    items:
      type: string
    description: "Ordered path through the system"
  - id: contributing_factors
    type: array
    items:
      type: string
    description: "Factors that contributed to the issue"
required:
  - root_cause
  - causal_mechanism
  - propagation_path
additionalProperties: false
