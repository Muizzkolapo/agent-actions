################################################################################
# Support Ticket Triage — Field-by-Field Construction
################################################################################
# Description: Triage support tickets using plain-text LLM responses.
#              Each action produces ONE field via output_field. By the end,
#              all fields are assembled into a complete triage record.
#
# Showcases:
#   - json_mode: false — works with ANY model
#   - output_field: each action names its output field (no schema needed)
#   - Progressive context: later steps see earlier fields, not raw ticket
#   - Guard as cost control: skip response drafting for low-severity tickets
#   - Seed data for routing rules (works in non-JSON mode too)
#
# Why not JSON mode?
#   Some models can't produce valid JSON reliably.
#   By asking for ONE answer per step, any model that can follow a simple
#   instruction becomes usable. output_field names the result;
#   the model just needs to produce the value as plain text.
################################################################################

name: support_resolution
description: "Triage support tickets using field-by-field construction"
version: "1.0.0"

defaults:
  json_mode: false                    # ← Plain text responses, no JSON required
  granularity: Record
  is_operational: true
  run_mode: batch
  model_vendor: gemini
  model_name: gemini-flash-lite-latest
  api_key: GEMINI_API_KEY
  record_limit: 2      # Remove for full processing
  data_source:
    type: local
    folder: ./staging
    file_type: [json]
  context_scope:
    seed_path:
      routing_rules: $file:routing_rules.json

actions:
  # ==========================================================================
  # STEP 1: Classify issue type
  # output_field → issue_type
  # ==========================================================================
  - name: classify_issue
    intent: "Classify the support ticket into a category"
    output_field: issue_type           # ← Names the field, no schema needed
    prompt: $support_resolution.Classify_Issue
    context_scope:
      observe:
        - source.title
        - source.body
        - source.labels

  # ==========================================================================
  # STEP 2: Assess severity
  # output_field → severity
  # ==========================================================================
  - name: assess_severity
    dependencies: [classify_issue]
    intent: "Rate the severity of the issue"
    output_field: severity
    prompt: $support_resolution.Assess_Severity
    context_scope:
      observe:
        - source.title
        - source.body
        - classify_issue.issue_type
      drop:
        - source.labels               # Avoid anchoring on reporter's own labels

  # ==========================================================================
  # STEP 3: Identify product area
  # output_field → product_area
  # ==========================================================================
  - name: identify_area
    dependencies: [classify_issue]
    intent: "Identify which product area is affected"
    output_field: product_area
    prompt: $support_resolution.Identify_Area
    context_scope:
      observe:
        - source.title
        - source.body
        - classify_issue.issue_type

  # ==========================================================================
  # STEP 4: Assign team (uses seed data for routing)
  # output_field → assigned_team
  # ==========================================================================
  - name: assign_team
    dependencies: [assess_severity, identify_area]
    intent: "Route to the right team using routing rules"
    output_field: assigned_team
    prompt: $support_resolution.Assign_Team
    context_scope:
      observe:
        - classify_issue.issue_type
        - assess_severity.severity
        - identify_area.product_area
        - seed.routing_rules

  # ==========================================================================
  # STEP 5: Summarize the issue
  # output_field → summary
  # ==========================================================================
  - name: summarize_issue
    dependencies: [assess_severity, identify_area]
    intent: "Write a one-line summary for the triage dashboard"
    output_field: summary
    prompt: $support_resolution.Summarize_Issue
    context_scope:
      observe:
        - source.title
        - source.body
        - classify_issue.issue_type
        - assess_severity.severity
        - identify_area.product_area

  # ==========================================================================
  # STEP 6: Draft response (guarded — skip for low severity)
  # output_field → suggested_response
  # ==========================================================================
  - name: draft_response
    dependencies: [summarize_issue, assign_team]
    intent: "Draft a customer response — skipped for low-severity tickets"
    output_field: suggested_response
    prompt: $support_resolution.Draft_Response
    guard:
      condition: 'severity != "low"'
      on_false: "skip"
    context_scope:
      observe:
        - source.title
        - classify_issue.issue_type
        - assess_severity.severity
        - summarize_issue.summary
        - assign_team.assigned_team
      drop:
        - source.body                  # Response doesn't need raw body — summary is enough

  # ==========================================================================
  # STEP 7: Package output (tool — assembles all fields)
  # ==========================================================================
  - name: format_output
    dependencies: [draft_response]
    kind: tool
    impl: package_triage_result
    schema: format_output
    intent: "Assemble all fields into final triage record"
    context_scope:
      observe:
        - source.id
        - source.title
        - source.reporter
        - classify_issue.issue_type
        - assess_severity.severity
        - identify_area.product_area
        - assign_team.assigned_team
        - summarize_issue.summary
        - draft_response.suggested_response
