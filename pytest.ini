[pytest]
testpaths =
    tests
    agent_actions/cli/validators/test_local
pythonpath = .
norecursedirs = agent_actions/vendors/manual_vendor_checks
asyncio_mode = auto
markers =
    unit: Unit tests for individual components
    integration: Integration tests for workflow components
    performance: Performance and load tests
    edge_case: Edge case and error handling tests
    config: Configuration validation tests
    asyncio: Async tests using pytest-asyncio
    anyio: Async tests using pytest-anyio
    requires_real_batch_backend: Tests requiring real batch API infrastructure (OpenAI, Anthropic, etc.)
