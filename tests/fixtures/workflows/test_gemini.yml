name: test_gemini
description: "Test workflow for Google Gemini provider"
version: "1.0.0"

defaults:
  model_vendor: gemini
  model_name: gemini-2.0-flash
  api_key: GOOGLE_API_KEY
  json_mode: true
  granularity: Record
  run_mode: online
  temperature: 0.7
  max_tokens: 1024          # mapped to max_output_tokens automatically
  top_p: 0.9
  stop: "\n\n"              # mapped to stop_sequences automatically

actions:
  - name: summarize
    intent: "Summarize input content"
    prompt: "Summarize the following content in 2-3 sentences."
    json_mode: true
    schema:
      summary: string

  - name: classify
    intent: "Classify the content"
    prompt: "Classify the content into one of: news, research, opinion, other."
    json_mode: false
    temperature: 0.3
    stop: null
